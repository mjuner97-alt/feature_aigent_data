# ============================================================================
# Sandbox / 多副本 / 远程文件系统 (com.agentscopea2a.harness.config)
# ----------------------------------------------------------------------------
# 默认全部关闭 → 单副本本地 JVM 模式，沙箱、Redis、SSH 都不会被实例化。
# 启用 sandbox：FilesystemConfig 注入 DockerFilesystemSpec，shell_execute /
# filesystem / skill_save 全部跑进 Docker 容器。
# 启用 distributed：JedisBaseStore + RemoteFilesystemSpec 让多副本共享
# MEMORY.md / sessions / skills；并启用 RedisSandboxExecutionGuard 防多副本
# 抢同一沙箱槽位。
# ============================================================================

# ---- Sandbox：把 shell/filesystem 隔离到 Docker --------------------------
#harness.a2a.sandbox.enabled=true
#harness.a2a.sandbox.image=deepanalyze-vllm:latest
#harness.a2a.sandbox.workspace-root=/workspace
# SESSION / USER / AGENT / GLOBAL — 所有用户/会话共用一个容器请配 GLOBAL +
# shared-container-name。注意 GLOBAL 共享意味着 /tmp 与未挂载目录跨租户共享，
# 必须开启 memory.mysql-mirror 才能保住租户隔离。
#harness.a2a.sandbox.isolation-scope=GLOBAL
#harness.a2a.sandbox.subagent-isolation-scope=
#harness.a2a.sandbox.mount-skills=true
#harness.a2a.sandbox.mount-memory=true
#harness.a2a.sandbox.mount-artifacts=true
# 运维提前 docker run -d --name <此名> ...，本进程只 docker exec 进去，不创建/不销毁。
#harness.a2a.sandbox.shared-container-name=harness-a2a-shared

# ---- 多副本（Redis 协调 + 共享 BaseStore） ------------------------------
