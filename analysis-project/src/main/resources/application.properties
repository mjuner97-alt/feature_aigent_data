# ============================================================================
# Sandbox / 多副本 / 远程文件系统 (com.agentscopea2a.harness.config)
# ----------------------------------------------------------------------------
# 默认全部关闭 → 单副本本地 JVM 模式，沙箱、Redis、SSH 都不会被实例化。
# 启用 sandbox：FilesystemConfig 注入 DockerFilesystemSpec，shell_execute /
# filesystem / skill_save 全部跑进 Docker 容器。
# 启用 distributed：JedisBaseStore + RemoteFilesystemSpec 让多副本共享
# MEMORY.md / sessions / skills；并启用 RedisSandboxExecutionGuard 防多副本
# 抢同一沙箱槽位。
# ============================================================================

# ---- Sandbox：把 shell/filesystem 隔离到 Docker --------------------------
#harness.a2a.sandbox.enabled=true
#harness.a2a.sandbox.image=deepanalyze-vllm:latest
#harness.a2a.sandbox.workspace-root=/workspace
# SESSION / USER / AGENT / GLOBAL — 所有用户/会话共用一个容器请配 GLOBAL +
# shared-container-name。注意 GLOBAL 共享意味着 /tmp 与未挂载目录跨租户共享，
# 必须开启 memory.mysql-mirror 才能保住租户隔离。
#harness.a2a.sandbox.isolation-scope=GLOBAL
#harness.a2a.sandbox.subagent-isolation-scope=
#harness.a2a.sandbox.mount-skills=true
#harness.a2a.sandbox.mount-memory=true
#harness.a2a.sandbox.mount-artifacts=true
# 运维提前 docker run -d --name <此名> ...，本进程只 docker exec 进去，不创建/不销毁。
#harness.a2a.sandbox.shared-container-name=harness-a2a-shared

# ---- 多副本（Redis 协调 + 共享 BaseStore） ------------------------------
#harness.a2a.distributed.enabled=true
#harness.a2a.distributed.redis-host=127.0.0.1
#harness.a2a.distributed.redis-port=6379
#harness.a2a.distributed.redis-password=
#harness.a2a.distributed.isolation-scope=USER

# ---- Artifact 走 SSH（远端 Docker daemon 场景） ------------------------
# 当 Docker 在另一台机器上时，CSV 必须落在那台机器的磁盘，否则容器 bind-mount
# 看到的是空目录。开启后 ArtifactStore 用 SshArtifactIo 把 base64 over ssh
# 写到 remote-root，原子 mv -f；本地 JVM 不再写盘。
#harness.a2a.artifacts.remote.enabled=true
#harness.a2a.artifacts.remote.ssh-target=user@docker-host.example.com
#harness.a2a.artifacts.remote.remote-root=/srv/harness-a2a/artifacts
#harness.a2a.artifacts.remote.ssh-options[0]=-i
#harness.a2a.artifacts.remote.ssh-options[1]=/home/me/.ssh/id_rsa
#harness.a2a.artifacts.remote.timeout-seconds=30

# ---- skills/ memory/ 双向同步（同样用于远端 Docker） -------------------
# 子 agent 在容器里写的技能 / 记忆落在远端，host JVM 通过 RemoteDirSyncer
# 拉回；host 写的技能反向推送。mtime LWW 1 秒容差，默认 20 秒一次。
#harness.a2a.skills.remote.enabled=true
#harness.a2a.skills.remote.ssh-target=user@docker-host.example.com
#harness.a2a.skills.remote.remote-root=/srv/harness-a2a/skills
#harness.a2a.memory.remote.enabled=true
#harness.a2a.memory.remote.ssh-target=user@docker-host.example.com
#harness.a2a.memory.remote.remote-root=/srv/harness-a2a/memory
