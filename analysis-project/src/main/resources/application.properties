# ---- Artifact 临时 CSV (InfraConfig + ArtifactSweeper) ----------------------
#harness.a2a.artifacts.keep=false
#harness.a2a.artifacts.sweeper.enabled=true
#harness.a2a.artifacts.sweeper.max-age-hours=6

# ---- 上下文压缩 / 工具结果驱逐阈值 (SupervisorService) ----------------------
#harness.a2a.compaction.trigger=40
#harness.a2a.compaction.keep=12
#harness.a2a.tool-eviction.max-chars=80000
harness.a2a.tool-execution.timeout-seconds=300
# P1-D: 分级 timeout —— 外层 agent_spawn / 中层单 tool / 内层 python_exec 默认
# 三层独立配置,避免一刀切。LLM 看到 inner 超时报错可继续在 outer 内重试。
#harness.a2a.code-interpreter.iter-timeout-seconds=120
harness.a2a.python-exec.default-timeout-seconds=60
harness.a2a.python-exec.max-timeout-seconds=300
# cache 命中后 ResponseCacheHook 已在 HIT 路径同步 bumpAndMaybeSynthesize，蒸馏不再依赖 MISS
harness.a2a.response-cache.enabled=true

# ---- Skill 自进化 PR2 (默认关) --------------------------------------------
# 已在 application-sandbox-windows.properties 中置为 false，防止旧 fingerprint
# 阈值命中后重生成错误 skill。
# Fingerprint 与 ResponseCacheHook 共用，因此 cache 命中不会触发计数(短路在
# CacheHitException，本 hook 的 PostCall 不会执行)。
harness.skills.auto-synth.enabled=false

# ---- Skill 自进化 PR3 — focused retrieval (默认关) ------------------------
# SkillRetrievalHook 在 PreCall 用 L1 fingerprint + L2 vector top-K 命中后，
# 把 SKILL.md 内容 append 到 system prompt。WorkspaceContextHook 的全量注入路径
# 仍并行运行(JAR 内部无 disable API),所以 PR3 是"净增"路径,默认关闭。
# 打开前必须保证 harness.embedding.* 已配置且能拿到向量;否则只有 L1 生效。
harness.skills.retrieval.enabled=true
harness.skills.retrieval.top-k=3
# PR3.7 — bge-large-zh-v1.5 中文短句 cosine 区间偏低(0.55~0.78),原 0.72 阈值会让
# 同维度换措辞问题 silent-miss。实测 rich embed(desc + sample_questions)下:
#   R1 同维换措辞=0.70  R3 同维换措辞=0.77  R4 跨部门同 skill=0.66  R2 极短问句=0.57
# 0.55 默认值放过 R2 这种极简短句也能命中,false-positive 风险换"用户感知到 PR3 真的工作"。
# 切回 OpenAI text-embedding-3-* 时建议调回 0.78~0.82。
harness.skills.retrieval.min-cosine=0.55

# ---- Skill 自进化 PR4 — failure feedback closed loop (默认关) -----------------
# SkillEvolutionHook 在 PostCall 读取 SkillRetrievalHook(PR3)写入 RuntimeContext 的
# skills.retrieved,根据本轮失败信号(python_exec 重试 ≥2)以及下一轮的用户负反馈
# (含拒绝关键词)给每个被召回的 skill 累计 success_count / failure_count。
# 失败率超过 fail-rate-evolve(默认 0.3)且总次数 ≥ min-uses-evolve(默认 5)时,
# 异步调用 SkillDistiller.evolve 重写 SKILL.md(同文件名,version + 1,counts 归零)。
# 失败率超过 fail-rate-blacklist(默认 0.6)且总次数 ≥ min-uses-blacklist(默认 10)
# 时,status 改为 'blacklist',SkillVectorIndex 自动停止召回(SQL 已带 status='active'
# 过滤),文件与累计数据保留以便人工 review。
# 同一 skill 并发演进通过 SkillEvolutionRunner 的 ConcurrentHashMap CAS 防护,只有
# 第一个抢到 lock 的请求会真正执行 LLM 演进,其他直接放行。
harness.skills.evolution.enabled=true
harness.skills.evolution.fail-rate-evolve=0.3
harness.skills.evolution.fail-rate-blacklist=0.6
harness.skills.evolution.min-uses-evolve=5
harness.skills.evolution.min-uses-blacklist=10
# 用户负反馈关键词(逗号分隔)。命中任一即视为对上一轮答案的否认,给上一轮被召回的
# skill 累计一次 failure。
harness.skills.evolution.rejection-keywords=不对,错了,重算,重新,不是这样,不正确

# ---- Embedding client (PR3 依赖, 默认关) ----------------------------------
# OpenAI 兼容的 /embeddings 端点,任何返回 {data:[{embedding:[...]}]} 的服务都行。
# 关闭时 OpenAiCompatEmbeddingClient bean 不会创建,SkillRetrievalHook 退化为
# L1-only,SkillSaveTool 跳过 embedding upsert(skill_index.embedding 留空)。
# dim 必须严格等于模型实际维度,否则一律拒绝写入(防止两套向量空间混入同一列)。
harness.embedding.enabled=true
harness.embedding.endpoint=http://116.148.122.44:11434/v1/embeddings
harness.embedding.api-key=
harness.embedding.model=quentinz/bge-large-zh-v1.5:latest
harness.embedding.dim=1024


# ---- Memory MySQL 镜像 (默认关) -------------------------------------------
# 启用后：MEMORY.md / 每日 jsonl 异步镜像到 agent_memory / agent_memory_ledger
# 表，DB 成为跨副本/重启的真相之源；agent 主路径只写本地文件，watcher 后台
# 5 秒轮询一次推到 MySQL，不影响 agent 响应时长。
harness.a2a.memory.mysql-mirror.enabled=true
#harness.a2a.memory.mysql-mirror.poll-seconds=5

# ---- 夜间记忆咀嚼 (默认关) -----------------------------------------------
# Phase 1: 清理 agent_memory_ledger 超过 ledger-retention-days 的行
# Phase 2: 挖掘 episodic_memory 当日的工具调用轨迹 → user_trace_summary
# Phase 3: 对高频失败的工具链进行技能演化
# Phase 4: 将成功流程归并到该用户的 MEMORY.md
harness.a2a.memory.digestion.enabled=true
# cron 表达式 — 默认晚间 21:09（:09 避开整点半点踩踏）
harness.a2a.memory.digestion.cron=0 9 21 * * *
# 每批处理的 session 数
harness.a2a.memory.digestion.batch-size=50
# episodic 原始对话保留天数（超过此天数标记为 archived）
harness.a2a.memory.digestion.episodic-retention-days=30
# ledger 保留天数（超过此天数的行清理）
harness.a2a.memory.digestion.ledger-retention-days=90
# LLM 摘要的最大字符数
harness.a2a.memory.digestion.summary-max-length=200
# episodic_memory 表名（默认与 SupervisorService 配置保持一致）
harness.a2a.memory.digestion.episodic-table-name=QualitySupervisor_episodic_memory


# 禁用 sandbox，场景 A（data_primitives）和 C（save_skill）不需要远端 Docker 沙箱
# 禁用 sandbox，场景 A / C 不需要远端 Docker
harness.a2a.sandbox.enabled=false