spring.application.name = analysis_project
spring.profiles.active=dev


# ==== 多数据源:禁用 mybatis-spring-boot-starter 的自动配置 ===================
# 我们在 com.agentscopea2a.config.datasource 下手动声明 3 套
# SqlSessionFactory + MapperScan,自动配置会与之冲突,这里关闭。
spring.autoconfigure.exclude=org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration


# Skill #0：原始数据查询
agentscope.a2a.server.card.skills[0].id=query_quality_data
agentscope.a2a.server.card.skills[0].name=查询质量数据
agentscope.a2a.server.card.skills[0].description=按版本/季度/部门/应用/人员查询质量(缺陷密度)数据。
agentscope.a2a.server.card.skills[0].tags[0]=quality
agentscope.a2a.server.card.skills[0].tags[1]=query
agentscope.a2a.server.card.skills[0].examples[0]=查询2026年1季度杭州开发一部的质量数据

# Skill #1：在 #0 的数据基础上做分析
agentscope.a2a.server.card.skills[1].id=analyze_data
agentscope.a2a.server.card.skills[1].name=数据分析
agentscope.a2a.server.card.skills[1].description=对质量数据做趋势/对比/归因分析，自动调用查询子智能体取数。
agentscope.a2a.server.card.skills[1].tags[0]=quality
agentscope.a2a.server.card.skills[1].tags[1]=analysis
agentscope.a2a.server.card.skills[1].examples[0]=对比2026年1季度和2025年4季度杭州开发一部的缺陷密度

# Skill #2：把对话流程沉淀为 SKILL.md（写到 workspace/skills/）
agentscope.a2a.server.card.skills[2].id=generate_skill
agentscope.a2a.server.card.skills[2].name=保存技能
agentscope.a2a.server.card.skills[2].description=把当前对话中的工作流程保存为可复用的 SKILL.md。
agentscope.a2a.server.card.skills[2].tags[0]=skill
agentscope.a2a.server.card.skills[2].examples[0]=把刚才的查询流程保存为skill


# ============================================================================
# 大模型多实例配置 (com.agentscopea2a.agent.model.ModelProperties)
# ----------------------------------------------------------------------------
# 全部从配置文件读取 - 支持同时使用多个不同的模型(supervisor / 各 subagent
# 可以分别绑定不同实例)。新增模型 = 新增一段 instances.<名字>.* 即可。
# ============================================================================

# 默认模型(没有显式指定时所有 agent 都用这个)
harness.a2a.model.default-model=glm-main

# Supervisor(主对话)用的实例;不写则回退到 default
#harness.a2a.model.supervisor=glm-main

# ---- 实例 #1:GLM (默认主对话) ----------------------------------------------
harness.a2a.model.instances.glm-main.provider=glm
harness.a2a.model.instances.glm-main.api-key=ark-ad3231aa-d7f1-46fa-8bb5-226790780821-c68e3
harness.a2a.model.instances.glm-main.base-url=https://ark.cn-beijing.volces.com/api/coding
harness.a2a.model.instances.glm-main.name=glm-5.1

