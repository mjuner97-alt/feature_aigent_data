# ============================================================================
# V3.0 Verification Agent (harness.a2a.verification.*)
# ----------------------------------------------------------------------------
# Phase 1 ships mode=advisory by default (verify + score + record + annotate).
# Set mode=corrective to enable the repair closed-loop (gotoReasoning re-entry).
# ============================================================================

# ---- 实例: verify / critic 独立模型(降级隔离) -----------------------------------------------
# verify / critic 使用独立模型实例，与主对话模型(glm-main)隔离，避免相互影响。
# 当 verify 或 critic 的 api-key 为空时，自动回退到默认模型(glm-main)。
# 模型实例名须在 harness.a2a.model.instances.* 中定义（见上方 glm-main / fallback 段）。
# verify-model-key: 指向模型实例名，用于 Verify Agent（语义验证）的 LLM 调用
# critic-model-key:  指向模型实例名，用于 Critic Agent（对抗攻击）的 LLM 调用
harness.a2a.model.instances.verify.api-key=${LLM_API_KEY:sk-cefdb64866204540b9a8f0dfa5373a9d}
harness.a2a.model.instances.verify.base-url=${LLM_API_URL:https://api.deepseek.com/v1}
harness.a2a.model.instances.verify.name=${LLM_MODEL:deepseek-v4-flash}
harness.a2a.model.instances.critic.api-key=${LLM_API_KEY:sk-cefdb64866204540b9a8f0dfa5373a9d}
harness.a2a.model.instances.critic.base-url=${LLM_API_URL:https://api.deepseek.com/v1}
harness.a2a.model.instances.critic.name=${LLM_MODEL:deepseek-v4-flash}
harness.a2a.verification.verify-model-key=verify
harness.a2a.verification.critic-model-key=critic

# ---- 总开关 / 处置模式 / 检查点 ----------------------------------------------------------------
# enabled: 全局开关，关闭后跳过所有验证环节（verify / critic / repair）
# mode:
#   advisory  — 仅验证并记录结果，不干预 Agent 输出（Phase 1 默认，安全）
#   corrective — 验证失败后触发 repair 闭环，执行 gotoReasoning 修正
# checkpoints: 逗号分隔的验证触发时机列表
#   subagent-exit    — 子智能体返回结果时触发验证
#   supervisor-exit  — 主智能体输出最终答案前触发验证
#   per-critical-tool — 关键工具每次调用后立即触发验证
# subagent-exit-scope: 限定哪些子智能体在退出时触发验证（逗号分隔的 agent-id）
# critical-tools: 定义为"关键工具"的工具列表（需 critical-tools-enabled=true 才生效）
# annotate-final-answer: 是否在最终答案中添加验证摘要注解（[可信度:XX分, 验证结论:pass]）
harness.a2a.verification.enabled=true
harness.a2a.verification.mode=advisory
harness.a2a.verification.checkpoints=subagent-exit,supervisor-exit,per-critical-tool
harness.a2a.verification.subagent-exit-scope=analyze_data,query_data
harness.a2a.verification.critical-tools=data_query,data_aggregate,router_tool
harness.a2a.verification.critical-tools-enabled=true
harness.a2a.verification.annotate-final-answer=true

# ---- 闭环上界 (V3.0: max=2) -------------------------------------------------------------------
# max-verify-loops: 每轮验证最多允许的 repair 迭代次数（超过则截断，默认 2 次）
# max-verify-calls-per-request: 单次请求中验证 + critc + repair 的总调用次数上限
# verify-timeout-seconds: 单次 verify 调用的超时时间（超时后标记为 UNVERIFIED 降级）
# circuit-breaker-failures: 连续失败次数阈值，超出后熔断（跳过后续验证，直接标记 UNVERIFIED）
harness.a2a.verification.max-verify-loops=2
harness.a2a.verification.max-verify-calls-per-request=6
harness.a2a.verification.verify-timeout-seconds=180
harness.a2a.verification.circuit-breaker-failures=3

# ---- Trust Score (权重 + 分档阈值) -------------------------------------------------------------
# 综合可信度评分 = Σ(w_i × dim_i)，满分为各维度加权和（0-100）
# 分档阈值（用于将数值分数映射为离散 verdict）:
#   pass-threshold  — trustScore >= 此值  => verdict=pass（通过）
#   warn-threshold  — trustScore >= 此值  => verdict=warn（警告，需关注）
#                    trustScore < 此值     => verdict=fail（失败）
#   direct-threshold — trustScore >= 此值 => 答案可直接输出（不追加注解）
#   hint-threshold   — trustScore >= 此值 => 追加轻度提示（不阻断输出）
# 权重参数（六维度，权重和 = 1.0）:
#   w-data:       数据维度权重（数据来源、时效性、准确性）
#   w-tool:       工具维度权重（工具选择、参数、执行结果）
#   w-semantic:   语义维度权重（业务逻辑、结论一致性）
#   w-adversarial:对抗维度权重（反事实攻击、边界测试）
#   w-evidence:   证据维度权重（预留，当前为 0）
#   w-freshness:  时效性维度权重（预留，当前为 0）
harness.a2a.verification.trust.pass-threshold=85
harness.a2a.verification.trust.warn-threshold=60
harness.a2a.verification.trust.direct-threshold=90
harness.a2a.verification.trust.hint-threshold=70
harness.a2a.verification.trust.w-data=0.30
harness.a2a.verification.trust.w-tool=0.20
harness.a2a.verification.trust.w-semantic=0.30
harness.a2a.verification.trust.w-adversarial=0.20
harness.a2a.verification.trust.w-evidence=0.0
harness.a2a.verification.trust.w-freshness=0.0

# ---- Critic (对抗 + 反事实) -------------------------------------------------------------------
# enabled:  是否启用 Critic Agent（对验证结果进行攻击性检验，发现遗漏的漏洞）
# checkpoints: Critic 的触发时机（目前仅在 supervisor-exit 时执行一次）
# counterfactual: 是否启用反事实推理（"如果去掉某数据源，结论是否仍成立？"）
harness.a2a.verification.critic.enabled=true
harness.a2a.verification.critic.checkpoints=supervisor-exit
harness.a2a.verification.critic.counterfactual=true

# ---- Repair Policy Engine ---------------------------------------------------------------------
# policy-path: repair 策略文件路径（YAML 格式，定义各 repair_type 的处置规则）
# allow-llm-fallback: 当策略文件未匹配时，是否允许 LLM 自主决定 repair 方案
# forbid-modify-result: 是否禁止 repair 直接修改 Agent 输出结果（仅生成建议，不自动替换）
harness.a2a.verification.repair.policy-path=workspace/policies/repair_policy.yaml
harness.a2a.verification.repair.allow-llm-fallback=true
harness.a2a.verification.repair.forbid-modify-result=true

# ---- Semantic Contract Registry ----------------------------------------------------------------
# enabled: 是否启用语义契约注册表（定义 Agent 输出的结构化契约，如字段格式、值域约束）
# cache-ttl-seconds: 契约缓存有效期（秒），减少重复加载
harness.a2a.verification.contract.enabled=true
harness.a2a.verification.contract.cache-ttl-seconds=300

# ---- Tool Capability Firewall ------------------------------------------------------------------
# enabled: 是否启用工具能力防火墙（拦截 Agent 调用超出其声明能力的工具）
harness.a2a.verification.firewall.enabled=true

# ---- V4.0 在线标定 / SLO / 自动回滚巡检 -------------------------------------------------------
# rollback-watch-interval-ms: 自动回滚巡检间隔（毫秒），后台线程定期检查 SLO 是否达标
# rollback-watch-timeout-ms: 巡检超时（毫秒），超过此时间后停止自动回滚监听
# slo.pass-rate-target: 通过率 SLO 目标（如 0.90 = 90%），低于此值触发告警/回滚
# slo.fabrication-rate-target: 伪造率 SLO 目标（如 0.05 = 5%），高于此值触发告警/回滚
# slo.p95-latency-ms-target: p95 验证延迟 SLO 目标（毫秒），高于此值触发告警
harness.a2a.verification.rollback-watch-interval-ms=120000
harness.a2a.verification.rollback-watch-timeout-ms=1800000
harness.a2a.verification.slo.pass-rate-target=0.90
harness.a2a.verification.slo.fabrication-rate-target=0.05
harness.a2a.verification.slo.p95-latency-ms-target=30000

# ---- Golden 评估定时回归 (默认关; 启用后按 cron 跑黄金用例集) --------------------------------
# enabled: 是否启用 Golden Dataset 定时回归测试
# cron:    Quartz cron 表达式，定义回归测试的执行时间（默认每天早 7 点）
harness.a2a.verification.golden.enabled=false
harness.a2a.verification.golden.cron=0 0 7 * * *

# ---- 确定性规则 (含 B4 契约) -------------------------------------------------------------------
# 各项独立开关，用于开启/关闭具体的确定性验证规则：
#   artifact-path        — 验证 artifact 文件路径是否跨租户越界
#   fabrication-from-nothing — 检测"无中生有"式伪造（输出中引用不存在的数据）
#   contract-violation   — 验证输出是否符合已注册的语义契约
#   tools-existence      — 验证工具调用中引用的工具名是否存在
#   param-schema         — 验证工具参数是否符合声明的 JSON Schema
#   empty-result         — 检测空结果是否被合理处理
#   entity-name           — 验证实体名称是否与数据源一致（防幻觉）
#   time-format           — 验证时间格式是否符合业务规范
#   arith-mental-math    — 检测 Agent 是否"心算"数值（应调用 arith 工具）
harness.a2a.verification.deterministic.artifact-path=true
harness.a2a.verification.deterministic.fabrication-from-nothing=true
harness.a2a.verification.deterministic.contract-violation=true
harness.a2a.verification.deterministic.tools-existence=true
harness.a2a.verification.deterministic.param-schema=true
harness.a2a.verification.deterministic.empty-result=true
harness.a2a.verification.deterministic.entity-name=true
harness.a2a.verification.deterministic.time-format=true
harness.a2a.verification.deterministic.arith-mental-math=true

# ---- 三级触发 (LOW/MEDIUM/HIGH) ----------------------------------------------------------------
# trigger.high-keywords: 高风险关键词列表（命中任一关键词即触发 HIGH 级验证）
#                        包含决策/经营/对比/趋势/预测/投资/风险等企业级关键词
# trigger.multi-table-threshold: 多表查询阈值（命中此数量的表以上时触发 MEDIUM 级验证）
harness.a2a.verification.trigger.high-keywords=决策,经营,对比,趋势,预测,投资,风险
harness.a2a.verification.trigger.multi-table-threshold=2