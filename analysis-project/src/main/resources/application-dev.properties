
# ==== Web 端口 ===============================================================
server.port=8081


# ==== 数据源 1：MySQL 业务库 (mysql) =========================================
# Bean 名: mysqlDataSource
spring.datasource.hikari.mysql.enabled=true
spring.datasource.hikari.mysql.jdbc-url=jdbc:mysql://XXXXX:3306/default_db?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.hikari.mysql.username=root
spring.datasource.hikari.mysql.password=MySQL@123456
spring.datasource.hikari.mysql.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.mysql.pool-name=DevMysqlHikariCP
spring.datasource.hikari.mysql.minimum-idle=5
spring.datasource.hikari.mysql.maximum-pool-size=20
spring.datasource.hikari.mysql.idle-timeout=600000
spring.datasource.hikari.mysql.max-lifetime=1800000
spring.datasource.hikari.mysql.connection-timeout=30000
spring.datasource.hikari.mysql.connection-test-query=SELECT 1
spring.datasource.hikari.mysql.auto-commit=true


# ==== 数据源 2：ClickHouse 分析库 (clickhouse) ===============================
# Bean 名: clickHouseDataSource
# 注意 ClickHouse 0.6.x 的 JDBC URL 格式: jdbc:clickhouse://host:port/database
spring.datasource.hikari.clickhouse.enabled=true
spring.datasource.hikari.clickhouse.jdbc-url=jdbc:clickhouse://XXXXX:8123/default
spring.datasource.hikari.clickhouse.username=default
spring.datasource.hikari.clickhouse.password=ClickHouse@123
spring.datasource.hikari.clickhouse.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver
spring.datasource.hikari.clickhouse.pool-name=DevClickHouseHikariCP
spring.datasource.hikari.clickhouse.minimum-idle=2
spring.datasource.hikari.clickhouse.maximum-pool-size=10
spring.datasource.hikari.clickhouse.idle-timeout=600000
spring.datasource.hikari.clickhouse.max-lifetime=1800000
spring.datasource.hikari.clickhouse.connection-timeout=30000
spring.datasource.hikari.clickhouse.connection-test-query=SELECT 1
spring.datasource.hikari.clickhouse.auto-commit=true


# ==== 数据源 3：openGauss / GaussDB (gauss) ==================================
# Bean 名: gaussDataSource
# openGauss 默认端口 5432,JDBC URL 与 PostgreSQL 形式一致
# 默认禁用,本机或 dev 没有 GaussDB,改为 true 才会注入相关 Bean
spring.datasource.hikari.gauss.enabled=false
spring.datasource.hikari.gauss.jdbc-url=jdbc:opengauss://XXXXX:5432/postgres?currentSchema=public
spring.datasource.hikari.gauss.username=myuser
spring.datasource.hikari.gauss.password=MyUser@123456
spring.datasource.hikari.gauss.driver-class-name=org.opengauss.Driver
spring.datasource.hikari.gauss.pool-name=DevGaussHikariCP
spring.datasource.hikari.gauss.minimum-idle=2
spring.datasource.hikari.gauss.maximum-pool-size=10
spring.datasource.hikari.gauss.idle-timeout=600000
spring.datasource.hikari.gauss.max-lifetime=1800000
spring.datasource.hikari.gauss.connection-timeout=30000
spring.datasource.hikari.gauss.connection-test-query=SELECT 1
spring.datasource.hikari.gauss.auto-commit=true


# ==== DEV 环境日志级别 =======================================================
logging.level.root=INFO
logging.level.com.agentscopea2a=DEBUG
logging.level.io.agentscope=DEBUG
