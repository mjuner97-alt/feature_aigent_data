
# ==== Web 端口 ===============================================================
server.port=8081


# ==== 数据源 1：MySQL 业务库 (mysql) =========================================
# Bean 名: mysqlDataSource
spring.datasource.hikari.mysql.enabled=true
spring.datasource.hikari.mysql.jdbc-url=jdbc:mysql://116.148.100.114:3306/agentscope?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.hikari.mysql.username=root
spring.datasource.hikari.mysql.password=lwj052607
spring.datasource.hikari.mysql.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.mysql.pool-name=DevMysqlHikariCP
spring.datasource.hikari.mysql.minimum-idle=5
spring.datasource.hikari.mysql.maximum-pool-size=20
spring.datasource.hikari.mysql.idle-timeout=600000
spring.datasource.hikari.mysql.max-lifetime=1800000
spring.datasource.hikari.mysql.connection-timeout=30000
spring.datasource.hikari.mysql.connection-test-query=SELECT 1
# 池内空闲连接每 5min 主动 ping 一次远端,避免运营商 NAT/防火墙静默断开后
# 第一次请求触发 TCP RST + 30s 超时(远端 MySQL 在 116.148.100.114)。
spring.datasource.hikari.mysql.keepalive-time=300000
spring.datasource.hikari.mysql.validation-timeout=5000
spring.datasource.hikari.mysql.auto-commit=true


