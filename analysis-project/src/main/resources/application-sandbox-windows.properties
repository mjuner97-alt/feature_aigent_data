# ============================================================================
# Sandbox profile — Windows JVM + Remote Linux Docker
# ============================================================================
# 对应 reference 工程的 .env / .env.windows 拓扑：
#   JVM 跑在 Windows，Docker daemon 在远端 Linux 机器（通过 ssh:// 连）
#
# 启用方式：
#   --spring.profiles.active=dev,sandbox-windows
#   或 application.properties:  spring.profiles.active=dev,sandbox-windows
#
# ⚠️ DOCKER_HOST 不是 Spring 属性，必须以 OS 环境变量方式注入，例如：
#     setx DOCKER_HOST "ssh://root@XXXXX"     (Windows 永久)
#     $env:DOCKER_HOST="ssh://root@XXXXX"     (PowerShell 当前会话)
#   docker CLI 直接读 OS env，Spring 这边管不到。
#
# 前置：
#   1. 远端机预先 docker run 好共享容器（名字与 shared-container-name 一致）
#   2. ssh -o BatchMode=yes ssh://root@116.148.121.118 'echo ok' 能免密通过
#   3. 远端 remote-root 目录已 mkdir -p 且 ssh 用户可写
# ============================================================================


# ---- Sandbox: 把 shell/filesystem 隔离到 Docker -----------------------------
harness.a2a.sandbox.enabled=true
harness.a2a.sandbox.image=deepanalyze-vllm:latest
harness.a2a.sandbox.workspace-root=/workspace
# GLOBAL = 全部用户 × 会话 × subagent 共享同一个容器（配合 shared-container-name）
harness.a2a.sandbox.isolation-scope=GLOBAL
harness.a2a.sandbox.subagent-isolation-scope=GLOBAL
harness.a2a.sandbox.mount-skills=true
harness.a2a.sandbox.mount-memory=true
harness.a2a.sandbox.mount-artifacts=true
# 运维侧需先 docker run -d --name <此名> ...，本进程只 docker exec 进去
harness.a2a.sandbox.shared-container-name=agentscope-shared-demo


# ---- Artifact 走 SSH（远端 Docker daemon 场景）----------------------------
# CSV 必须落到远端机磁盘，否则容器 bind-mount 看到空目录
harness.a2a.artifacts.remote.enabled=true
harness.a2a.artifacts.remote.ssh-target=docker-host
harness.a2a.artifacts.remote.remote-root=/opt/agentscope-workspace/harness-a2a/artifacts
# 自定义 ssh 选项；走密钥时打开下面两行
#harness.a2a.artifacts.remote.ssh-options[0]=-i
#harness.a2a.artifacts.remote.ssh-options[1]=/path/to/id_rsa
harness.a2a.artifacts.remote.timeout-seconds=30


# ---- Skills 双向同步（同样用于远端 Docker） -------------------------------
harness.a2a.skills.remote.enabled=true
harness.a2a.skills.remote.ssh-target=docker-host
harness.a2a.skills.remote.remote-root=/opt/agentscope-workspace/harness-a2a/skills
harness.a2a.skills.remote.timeout-seconds=30


# ---- Memory 远程同步 — Windows 必须 OFF -----------------------------------
# 原因：MemoryFlushHook 把 base64 后的 MEMORY.md 内联到 docker exec sh -c '...'，
# Windows CreateProcess 命令行 8KB 上限会触发 error=206 文件名或扩展名太长。
# MySQL mirror 兜底，关掉只是少了容器内文件副本，数据不丢。
harness.a2a.memory.remote.enabled=false
harness.a2a.memory.remote.ssh-target=root@116.148.121.118
harness.a2a.memory.remote.remote-root=/opt/agentscope-workspace/harness-a2a/memory
harness.a2a.memory.remote.timeout-seconds=30

# Memory MySQL 镜像：GLOBAL 共享容器下必须开（保住租户隔离的真相之源）
harness.a2a.memory.mysql-mirror.enabled=true
harness.a2a.memory.mysql-mirror.poll-seconds=5


# ---- 工作区同步轮询间隔 ---------------------------------------------------
harness.a2a.workspace.sync.intervalMs=20000
