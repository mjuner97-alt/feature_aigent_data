# ============================================================================
# Sandbox profile — Windows JVM + Remote Linux Docker
# ============================================================================
# 拓扑：
#   JVM 跑在 Windows，Docker daemon 跑在远端 Linux。
#   本 profile 通过本地 ssh.exe 执行 `ssh docker-host docker ...`，不要求 Windows 安装 docker.exe。
#
# 启用方式：
#   --spring.profiles.active=dev,sandbox-windows
#   或 application.properties:  spring.profiles.active=dev,sandbox-windows
#
# 前置：
#   1. Windows 本地 ssh.exe 可用
#   2. 远端机预先 docker run 好共享容器（名字与 shared-container-name 一致）
#   3. ssh -o BatchMode=yes docker-host 'echo ok && docker ps' 能免密通过
#   4. 远端 remote-root 目录已 mkdir -p 且 ssh 用户可写
# ============================================================================


# ---- Sandbox: 把 shell/filesystem 隔离到 Docker -----------------------------
harness.a2a.sandbox.enabled=true
harness.a2a.sandbox.image=deepanalyze-vllm:latest
harness.a2a.sandbox.workspace-root=/workspace
# GLOBAL = 全部用户 × 会话 × subagent 共享同一个容器（配合 shared-container-name）
harness.a2a.sandbox.isolation-scope=GLOBAL
harness.a2a.sandbox.subagent-isolation-scope=GLOBAL
harness.a2a.sandbox.mount-skills=true
harness.a2a.sandbox.mount-memory=true
harness.a2a.sandbox.mount-artifacts=true
harness.a2a.sandbox.remote-docker-enabled=true
harness.a2a.sandbox.remote-docker-ssh-target=docker-host
harness.a2a.sandbox.remote-docker-ssh-options[0]=-o
harness.a2a.sandbox.remote-docker-ssh-options[1]=StrictHostKeyChecking=accept-new
harness.a2a.sandbox.remote-docker-ssh-options[2]=-o
harness.a2a.sandbox.remote-docker-ssh-options[3]=LogLevel=ERROR
harness.a2a.sandbox.remote-docker-timeout-seconds=60
# 运维侧需先 docker run -d --name <此名> ...，本进程只 docker exec 进去
harness.a2a.sandbox.shared-container-name=agentscope-shared-demo


# ---- Artifact 走 SSH（远端 Docker daemon 场景）----------------------------
# CSV 必须落到远端机磁盘，否则容器 bind-mount 看到空目录
harness.a2a.artifacts.remote.enabled=true
harness.a2a.artifacts.remote.ssh-target=docker-host
harness.a2a.artifacts.remote.remote-root=/opt/agentscope-workspace/harness-a2a/artifacts
harness.a2a.artifacts.remote.ssh-options[0]=-o
harness.a2a.artifacts.remote.ssh-options[1]=StrictHostKeyChecking=accept-new
harness.a2a.artifacts.remote.ssh-options[2]=-o
harness.a2a.artifacts.remote.ssh-options[3]=LogLevel=ERROR
harness.a2a.artifacts.remote.timeout-seconds=30


# ---- Skills 双向同步（同样用于远端 Docker） -------------------------------
harness.a2a.skills.remote.enabled=true
harness.a2a.skills.remote.ssh-target=docker-host
harness.a2a.skills.remote.remote-root=/opt/agentscope-workspace/harness-a2a/skills
harness.a2a.skills.remote.ssh-options[0]=-o
harness.a2a.skills.remote.ssh-options[1]=StrictHostKeyChecking=accept-new
harness.a2a.skills.remote.ssh-options[2]=-o
harness.a2a.skills.remote.ssh-options[3]=LogLevel=ERROR
harness.a2a.skills.remote.timeout-seconds=30
# RemoteDirSyncer syncs skills-builtin/ → <remote-root>-builtin and
# skills-auto/ → <remote-root>-auto. Both dirs are bind-mounted into the
# sandbox container via FilesystemConfig.buildSandboxSpec().


# ---- Skill 自进化 PR2 — Windows 沙箱下启用 -------------------------------
# 历史原因：Auto-synth (Path B) 的 distractWithContext 在 PreCall 触发 LLM 调用，
# Windows JVM + 远端 Docker 拓扑下，LLM 网络延迟 + 临时文件路径差异曾导致蒸馏出
# 泛化 skill(query_quality_data/python_exec)，而非真实工具链。
# 现版本已修复工具链路，按 smoke-test-walkthrough.md §2.7 验证 PR2 重新启用。
harness.skills.auto-synth.enabled=true
# 原因：MemoryFlushHook 把 base64 后的 MEMORY.md 内联到 docker exec sh -c '...'，
# Windows CreateProcess 命令行 8KB 上限会触发 error=206 文件名或扩展名太长。
# MySQL mirror 兜底，关掉只是少了容器内文件副本，数据不丢。
harness.a2a.memory.remote.enabled=false
harness.a2a.memory.remote.ssh-target=docker-host
harness.a2a.memory.remote.remote-root=/opt/agentscope-workspace/harness-a2a/memory
harness.a2a.memory.remote.ssh-options[0]=-o
harness.a2a.memory.remote.ssh-options[1]=StrictHostKeyChecking=accept-new
harness.a2a.memory.remote.ssh-options[2]=-o
harness.a2a.memory.remote.ssh-options[3]=LogLevel=ERROR
harness.a2a.memory.remote.timeout-seconds=30

# Memory MySQL 镜像：GLOBAL 共享容器下必须开（保住租户隔离的真相之源）
harness.a2a.memory.mysql-mirror.enabled=true
harness.a2a.memory.mysql-mirror.poll-seconds=5


# ---- 工作区同步轮询间隔 ---------------------------------------------------
harness.a2a.workspace.sync.intervalMs=20000
