# ============================================================================
# Sandbox profile — Linux JVM + 同机本地 Docker (一台 Linux 全包)
# ============================================================================
# 对应 reference 工程的 .env.linux 拓扑：
#   JVM 与 Docker daemon 都在同一台 Linux 机器，走 /var/run/docker.sock，无需 SSH
#
# 启用方式：
#   --spring.profiles.active=dev,sandbox-linux
#
# 前置：
#   1. 当前用户在 docker 组：sudo usermod -aG docker $USER && newgrp docker
#   2. 镜像已 pull：docker images | grep deepanalyze-vllm
#   3. 共享容器已建好，workspace 路径与 workspace-path 对齐：
#        WS=/opt/agentscope-workspace/harness-a2a
#        mkdir -p $WS/skills $WS/skills-builtin $WS/skills-auto $WS/memory $WS/artifacts
#        docker run -d --name agentscope-shared-demo \
#          -v $WS/skills:/workspace/skills \
#          -v $WS/skills-builtin:/workspace/skills-builtin \
#          -v $WS/skills-auto:/workspace/skills-auto \
#          -v $WS/memory:/workspace/memory \
#          -v $WS/artifacts:/workspace/artifacts \
#          deepanalyze-vllm:latest sh -c 'while :; do sleep 3600; done'
#   4. DOCKER_HOST 不要设（留空走 unix socket）；如果 shell 里继承了 ssh://...，
#      记得 unset DOCKER_HOST。
# ============================================================================


# ---- Sandbox ---------------------------------------------------------------
harness.a2a.sandbox.enabled=true
harness.a2a.sandbox.image=deepanalyze-vllm:latest
harness.a2a.sandbox.workspace-root=/workspace
harness.a2a.sandbox.isolation-scope=GLOBAL
harness.a2a.sandbox.subagent-isolation-scope=GLOBAL
harness.a2a.sandbox.mount-skills=true
harness.a2a.sandbox.mount-memory=true
harness.a2a.sandbox.mount-artifacts=true
harness.a2a.sandbox.shared-container-name=agentscope-shared-demo


# ---- Workspace 路径 -------------------------------------------------------
# 必须等于 docker run 共享容器时 -v 的主机路径，否则 JVM 写文件容器看不到。
harness.a2a.workspace.path=/opt/agentscope-workspace/harness-a2a


# ---- 本地 Docker 不需要 SSH 同步 -----------------------------------------
# FilesystemConfig 会自动回退到 workspace.resolve("...") 本地 bind mount。
harness.a2a.artifacts.remote.enabled=false
harness.a2a.skills.remote.enabled=false
harness.a2a.memory.remote.enabled=false


# ---- Memory MySQL 镜像：GLOBAL 共享容器下必须开 -------------------------
harness.a2a.memory.mysql-mirror.enabled=true
harness.a2a.memory.mysql-mirror.poll-seconds=5
